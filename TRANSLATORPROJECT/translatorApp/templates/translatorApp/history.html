{% extends 'base.html' %}
{% block content %}
<h2>Translation history</h2>
{% for item in data %}
<div>
 <p>
    
        {{ item.original_text }} -> {{ item.translated_text }}
        
        {{item.source_language }} -> {{ item.target_language }}
    </p>
    
    <a href="{% url 'edit' item.id %}">Edit</a>
    <a href="{% url 'delete' item.id %}">Delete</a>
</div>
   
    {% endfor %}

 {% endblock %}
